name: CI/CD Build and Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: portfolio-blog-api
  DOCKERHUB_NAMESPACE: sirawit17766
  API_URL: https://api.zxcvbn.online/health
  DEPLOY_GIF_URL: https://media.giphy.com/media/13HgwGsXF0aiGY/giphy.gif

jobs:
  build-publish-deploy:
    name: Build amd64 image, publish version tag, and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Create version image tag
        id: version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          IMAGE_TAG="v${PACKAGE_VERSION}-${GITHUB_RUN_NUMBER}"
          IMAGE_REF="${DOCKERHUB_NAMESPACE}/${IMAGE_NAME}:${IMAGE_TAG}"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"

      - name: Webhook alert deploy started
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        shell: bash
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL}" ]; then
            echo "DEPLOY_WEBHOOK_URL is not set. Skipping webhook alert."
            exit 0
          fi

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat > discord-payload.json <<EOF
          {
            "username": "GitHub Actions",
            "content": "🚀 Deploy started: ${IMAGE_TAG}",
            "embeds": [
              {
                "title": "🚀 Deployment Started",
                "description": "กำลัง build image, push ไป Docker Hub, แล้ว deploy เข้า server",
                "color": 3447003,
                "fields": [
                  { "name": "Repository", "value": "${GITHUB_REPOSITORY}", "inline": true },
                  { "name": "Branch", "value": "main", "inline": true },
                  { "name": "Version Tag", "value": "${IMAGE_TAG}", "inline": true },
                  { "name": "Image", "value": "\`${IMAGE_REF}\`", "inline": false },
                  { "name": "GitHub Actions", "value": "[Open run](${RUN_URL})", "inline": false }
                ],
                "image": { "url": "${DEPLOY_GIF_URL}" }
              }
            ]
          }
          EOF

          curl -fsS -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            --data @discord-payload.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build amd64 image and push version tag
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.version.outputs.image_ref }}

      - name: Webhook alert image pushed
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        shell: bash
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL}" ]; then
            echo "DEPLOY_WEBHOOK_URL is not set. Skipping webhook alert."
            exit 0
          fi

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat > discord-payload.json <<EOF
          {
            "username": "GitHub Actions",
            "content": "📦 Docker image pushed: ${IMAGE_TAG}",
            "embeds": [
              {
                "title": "📦 Image Published",
                "description": "Docker image ถูก build เป็น linux/amd64 และ push ขึ้น Docker Hub แล้ว กำลัง deploy เข้า server ต่อ",
                "color": 16776960,
                "fields": [
                  { "name": "Image", "value": "\`${IMAGE_REF}\`", "inline": false },
                  { "name": "Version Tag", "value": "${IMAGE_TAG}", "inline": true },
                  { "name": "Architecture", "value": "linux/amd64", "inline": true },
                  { "name": "GitHub Actions", "value": "[Open run](${RUN_URL})", "inline": false }
                ],
                "image": { "url": "${DEPLOY_GIF_URL}" }
              }
            ]
          }
          EOF

          curl -fsS -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            --data @discord-payload.json

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: SSH to server, pull uploaded image tag, and go live
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "IMAGE_TAG='${IMAGE_TAG}' bash -s" << 'EOF'
            set -e
            cd /root/Portfolio-Peem
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            if [ ! -s nginx/certs/origin.pem ] || [ ! -s nginx/certs/origin.key ]; then
              echo "Missing Cloudflare Origin Certificate files: nginx/certs/origin.pem and nginx/certs/origin.key"
              exit 1
            fi
            openssl x509 -in nginx/certs/origin.pem -noout -subject -issuer -dates
            openssl pkey -in nginx/certs/origin.key -noout
            docker-compose pull api
            docker-compose stop nginx || true
            docker-compose stop api || true
            docker-compose stop mongo || true
            docker-compose rm -f nginx || true
            docker-compose rm -f api || true
            docker-compose rm -f mongo || true
            docker-compose up -d --no-build
            docker-compose ps
            for attempt in $(seq 1 30); do
              if curl -fsSk https://localhost/health; then
                exit 0
              fi
              echo "Waiting for Nginx/API health check... attempt ${attempt}/30"
              sleep 2
            done
            docker-compose ps
            docker-compose logs --tail=80 nginx
            exit 1
          EOF

      - name: Webhook alert success
        if: success()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        shell: bash
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL}" ]; then
            echo "DEPLOY_WEBHOOK_URL is not set. Skipping webhook alert."
            exit 0
          fi

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat > discord-payload.json <<EOF
          {
            "username": "GitHub Actions",
            "content": "✅ Deploy สำเร็จ! ${IMAGE_TAG}",
            "embeds": [
              {
                "title": "✅ Deployment Successful!",
                "description": "Build, push Docker image, deploy to server, and health check completed.",
                "color": 5763719,
                "fields": [
                  { "name": "Repository", "value": "${GITHUB_REPOSITORY}", "inline": true },
                  { "name": "Branch", "value": "main", "inline": true },
                  { "name": "Version Tag", "value": "${IMAGE_TAG}", "inline": true },
                  { "name": "Image", "value": "\`${IMAGE_REF}\`", "inline": false },
                  { "name": "API Health", "value": "[${API_URL}](${API_URL})", "inline": false },
                  { "name": "GitHub Actions", "value": "[Open run](${RUN_URL})", "inline": false }
                ],
                "image": { "url": "${DEPLOY_GIF_URL}" }
              }
            ]
          }
          EOF

          curl -fsS -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            --data @discord-payload.json

      - name: Webhook alert failed
        if: failure()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        shell: bash
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL}" ]; then
            echo "DEPLOY_WEBHOOK_URL is not set. Skipping webhook alert."
            exit 0
          fi

          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          IMAGE_TAG_VALUE="${IMAGE_TAG:-not-created}"
          IMAGE_REF_VALUE="${IMAGE_REF:-not-created}"
          cat > discord-payload.json <<EOF
          {
            "username": "GitHub Actions",
            "content": "❌ Deploy ล้มเหลว: ${IMAGE_TAG_VALUE}",
            "embeds": [
              {
                "title": "❌ Deployment Failed",
                "description": "Pipeline หยุดก่อน deploy สำเร็จ ดู log ใน GitHub Actions เพื่อแก้จุดที่พัง",
                "color": 15548997,
                "fields": [
                  { "name": "Repository", "value": "${GITHUB_REPOSITORY}", "inline": true },
                  { "name": "Branch", "value": "main", "inline": true },
                  { "name": "Version Tag", "value": "${IMAGE_TAG_VALUE}", "inline": true },
                  { "name": "Image", "value": "\`${IMAGE_REF_VALUE}\`", "inline": false },
                  { "name": "GitHub Actions", "value": "[Open failed run](${RUN_URL})", "inline": false }
                ],
                "image": { "url": "${DEPLOY_GIF_URL}" }
              }
            ]
          }
          EOF

          curl -fsS -X POST "${DEPLOY_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            --data @discord-payload.json
