services:
  nginx:
    image: sirawit17766/portfolio-web:${IMAGE_TAG:-v1}
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: portfolio-blog-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - api_network
    restart: unless-stopped

  api:
    image: sirawit17766/portfolio-blog-api:${IMAGE_TAG:-v1}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-blog-api
    environment:
      PORT: 4000
      BLOG_STORAGE: mongo
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-portfolio_api}:${MONGO_INITDB_ROOT_PASSWORD:?Set MONGO_INITDB_ROOT_PASSWORD in .env before starting MongoDB}@mongo:27017/portfolio_blog?authSource=admin
      MONGODB_DB_NAME: portfolio_blog
      MONGODB_COLLECTION: posts
      CORS_ORIGINS: ${CORS_ORIGINS:-https://zxcvbn.online,https://www.zxcvbn.online,https://portfolio-mheepooh.online,https://www.portfolio-mheepooh.online}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?Set ADMIN_API_KEY in .env before starting the API}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
      POSTS_CACHE_TTL_MS: ${POSTS_CACHE_TTL_MS:-10000}
    expose:
      - "4000"
    depends_on:
      - mongo
    networks:
      - api_network
    mem_limit: 256m
    cpus: 0.50
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: portfolio-blog-mongo
    command: ["mongod", "--auth", "--noscripting", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-portfolio_api}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?Set MONGO_INITDB_ROOT_PASSWORD in .env before starting MongoDB}
    volumes:
      - "${MONGO_DATA_PATH:-./mongo-data}:/data/db"
    networks:
      - api_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.00

networks:
  api_network:
    name: api_network
