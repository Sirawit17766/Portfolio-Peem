version: "3.8"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-blog-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - api_network
    restart: unless-stopped

  api:
    image: sirawit17766/portfolio-blog-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-blog-api
    environment:
      PORT: 4000
      BLOG_STORAGE: mongo
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: portfolio_blog
      MONGODB_COLLECTION: posts
    expose:
      - "4000"
    depends_on:
      - mongo
    networks:
      - api_network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: portfolio-blog-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - api_network
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  api_network:
    name: api_network
