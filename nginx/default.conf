server_tokens off;

log_format security_audit
    '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
    'host="$host" request_time="$request_time" upstream="$upstream_addr" '
    'upstream_status="$upstream_status" cf_ray="$http_cf_ray"';

access_log /var/log/nginx/access.log security_audit;
error_log /var/log/nginx/error.log warn;

limit_req_zone $binary_remote_addr zone=web_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=addr_conn_limit:10m;
limit_req_status 429;
limit_conn_status 429;

map $request_method $blocked_method {
    default 1;
    GET 0;
    HEAD 0;
    POST 0;
    DELETE 0;
    OPTIONS 0;
}

map $http_user_agent $blocked_user_agent {
    default 0;
    ~*(acunetix|dirbuster|ffuf|gobuster|masscan|nikto|nessus|nmap|sqlmap|zgrab) 1;
}

map $query_string $blocked_query_string {
    default 0;
    ~*(<|>|%3c|%3e|base64_encode|GLOBALS|_REQUEST|union.*select) 1;
}

geo $realip_remote_addr $from_cloudflare {
    default 0;

    103.21.244.0/22 1;
    103.22.200.0/22 1;
    103.31.4.0/22 1;
    104.16.0.0/13 1;
    104.24.0.0/14 1;
    108.162.192.0/18 1;
    131.0.72.0/22 1;
    141.101.64.0/18 1;
    162.158.0.0/15 1;
    172.64.0.0/13 1;
    173.245.48.0/20 1;
    188.114.96.0/20 1;
    190.93.240.0/20 1;
    197.234.240.0/22 1;
    198.41.128.0/17 1;
    2400:cb00::/32 1;
    2606:4700::/32 1;
    2803:f800::/32 1;
    2405:b500::/32 1;
    2405:8100::/32 1;
    2a06:98c0::/29 1;
    2c0f:f248::/32 1;
}

server {
    listen 80;
    server_name zxcvbn.online www.zxcvbn.online api.zxcvbn.online api.portfolio-mheepooh.online api.target.local;

    if ($from_cloudflare = 0) {
        return 403;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name zxcvbn.online www.zxcvbn.online api.zxcvbn.online api.portfolio-mheepooh.online api.target.local;

    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
    add_header X-Robots-Tag "index, follow" always;

    client_body_timeout 10s;
    client_header_timeout 10s;
    client_max_body_size 1m;
    keepalive_timeout 15s;
    keepalive_requests 100;

    if ($from_cloudflare = 0) {
        return 403;
    }

    if ($blocked_method) {
        return 405;
    }

    if ($blocked_user_agent) {
        return 403;
    }

    if ($blocked_query_string) {
        return 403;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* (^|/)(Dockerfile|docker-compose\.ya?ml|package(-lock)?\.json|\.env|\.git|wrangler\.jsonc|tsconfig.*|vite\.config.*)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /api/contact {
        limit_conn addr_conn_limit 10;
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location ~ ^/(posts|analytics|health)(/|$) {
        limit_conn addr_conn_limit 20;
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        limit_conn addr_conn_limit 30;
        limit_req zone=web_limit burst=40 nodelay;
        expires 30d;
        try_files $uri =404;
    }

    location / {
        limit_conn addr_conn_limit 30;
        limit_req zone=web_limit burst=40 nodelay;
        expires 0;
        try_files $uri $uri/ /index.html;
    }
}
